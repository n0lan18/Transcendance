version: '3.8'

services:
  postgres:
    image: postgres:14
    env_file: .env
#      POSTGRES_DB: mydatabase
#      POSTGRES_USER: user
#      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data

  django:
    build: ./backend
    command: gunicorn myproject.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
    env_file: .env

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/usr/share/nginx/html

  nginx:
    build: ./nginx
    ports:
      - "8443:8443"
    depends_on:
      - django
      - frontend

volumes:
  postgres_data:
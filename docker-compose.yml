version: '3.8'

services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_DB: mydatabase
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data

  django:
    build: ./backend
    command: gunicorn myproject.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgres://user:password@postgres:5432/mydatabase
    expose:
      - "8000"

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/usr/share/nginx/html
    expose:
      - "443"
    depends_on:
      - django

  nginx:
    build: ./nginx
    volumes:
      - ./frontend:/usr/share/nginx/html
    ports:
      - "8443:8443"
    depends_on:
      - django
      - frontend

volumes:
  postgres_data: